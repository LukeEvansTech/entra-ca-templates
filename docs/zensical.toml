# Zensical Configuration — entra-ca-templates
[project]
site_name = "entra-ca-templates"
site_description = "Microsoft Entra Conditional Access policies as code, with Maester verification"
site_author = "Luke Evans"
site_url = "https://lukeevanstech.github.io/entra-ca-templates/"
copyright = "Copyright © 2026 Luke Evans"

docs_dir = "docs"
site_dir = "site"
use_directory_urls = true
dev_addr = "localhost:8000"

[project.theme]
name = "material"
variant = "modern"
language = "en"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "light-blue"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "light-blue"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

repo_url = "https://github.com/LukeEvansTech/entra-ca-templates/"
repo_name = "LukeEvansTech/entra-ca-templates"
edit_uri = "edit/main/docs/docs"

[[nav]]
Home = "index.md"

[[nav]]
"Templates" = [
  { "Block legacy auth" = "templates/block-legacy-auth.md" },
  { "MFA for admins" = "templates/mfa-for-admins.md" }
]

[markdown_extensions]
admonition = {}
toc = { permalink = true }

[markdown_extensions.pymdownx.superfences]
custom_fences = [{ name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }]
